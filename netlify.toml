[build]
  command = "npm run build --workspace=client"
  publish = "client/dist"

[[redirects]]
  from = "/api/*"
  to = "https://meliprint-web-production.up.railway.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/print/*"
  to = "/print/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
